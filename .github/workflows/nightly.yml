name: Nightly Tests

on:
  schedule:
    - cron: "0 2 * * *"   # 2 AM UTC
  workflow_dispatch:

env:
  PNPM_VERSION: 10.32.1
  NODE_VERSION: "20"

jobs:
  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
          POSTGRES_DB: forge_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm typecheck

      - name: Unit tests with coverage
        env:
          DATABASE_URL: postgres://forge:forge@localhost:5432/forge_test
          REDIS_URL: redis://localhost:6379
        run: pnpm test:unit

      - name: BDD tests
        env:
          DATABASE_URL: postgres://forge:forge@localhost:5432/forge_test
          REDIS_URL: redis://localhost:6379
        run: pnpm test:bdd

      - name: Install Playwright browsers
        run: pnpm --filter @forge/web exec playwright install --with-deps chromium firefox

      - name: Start services for E2E
        run: |
          docker compose -f docker-compose.test.yml up -d
          sleep 10

      - name: Run E2E tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          DATABASE_URL: postgres://forge:forge@localhost:5433/forge_test
          REDIS_URL: redis://localhost:6380
        run: pnpm test:e2e

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-coverage-${{ github.run_number }}
          path: |
            apps/api/coverage/
            apps/web/coverage/
            apps/api/reports/
            apps/web/playwright-report/

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly tests failed — ${new Date().toISOString().split('T')[0]}`,
              body: `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['nightly-failure', 'automated']
            })
