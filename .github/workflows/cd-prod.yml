name: CD — Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234)"
        required: true
        type: string
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true
        type: string

permissions:
  contents: write
  packages: read
  id-token: write

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: ${{ inputs.confirm != 'DEPLOY' }}
        run: |
          echo "Confirmation not received. Aborting."
          exit 1

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Run DB migrations
        run: |
          aws ecs run-task \
            --cluster forge-prod \
            --task-definition forge-migrate \
            --overrides '{"containerOverrides":[{"name":"migrate","environment":[{"name":"RUN_MIGRATIONS","value":"true"}]}]}' \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_IDS }}],securityGroups=[${{ secrets.SG_IDS }}]}"
      - name: Deploy API to production
        run: |
          aws ecs update-service --cluster forge-prod --service forge-api \
            --force-new-deployment --region ${{ secrets.AWS_REGION }}
      - name: Deploy Web to production
        run: |
          aws ecs update-service --cluster forge-prod --service forge-web \
            --force-new-deployment --region ${{ secrets.AWS_REGION }}
      - name: Tag release
        run: |
          git tag "release-${{ inputs.image_tag }}"
          git push origin "release-${{ inputs.image_tag }}"
