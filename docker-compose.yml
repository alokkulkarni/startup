version: "3.9"

name: forge

networks:
  forge_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  keycloak_data:

services:
  # ── Traefik reverse proxy (file provider — no Docker socket required) ─────
  traefik:
    image: traefik:v3.0
    container_name: forge_traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"   # Traefik dashboard
    volumes:
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/routes.yml:/etc/traefik/routes.yml:ro
    networks:
      - forge_network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: forge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - forge_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: forge_redis
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    networks:
      - forge_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO object storage ──────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: forge_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"    # MinIO Console
    networks:
      - forge_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── MinIO bucket init ─────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: forge_minio_init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infra/minio/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - forge_network
    restart: "no"

  # ── Keycloak auth ─────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: forge_keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: forge
      KC_DB_PASSWORD: forge
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8081"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8081"
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      GITHUB_KC_CLIENT_ID: ${GITHUB_KC_CLIENT_ID:-}
      GITHUB_KC_CLIENT_SECRET: ${GITHUB_KC_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - forge_network
    healthcheck:
      # ubi9-micro has no curl/wget/microdnf — use bash built-in TCP check
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8081 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  # ── Keycloak SSL setup (disables sslRequired for local dev on fresh installs)
  keycloak-setup:
    image: quay.io/keycloak/keycloak:24.0
    container_name: forge_keycloak_setup
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - forge_network
    environment:
      GITHUB_KC_CLIENT_ID: ${GITHUB_KC_CLIENT_ID:-}
      GITHUB_KC_CLIENT_SECRET: ${GITHUB_KC_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    entrypoint:
      - bash
      - -c
      - |
        KCADM="/opt/keycloak/bin/kcadm.sh"
        SERVER="--no-config --server http://keycloak:8081 --realm master --user admin --password admin"

        # Disable SSL requirement for local dev
        $KCADM update realms/master -s sslRequired=none $SERVER
        $KCADM update realms/forge  -s sslRequired=none $SERVER
        echo "✔ SSL requirements disabled"

        # Configure GitHub identity provider (only if credentials are provided)
        if [ -n "$GITHUB_KC_CLIENT_ID" ] && [ -n "$GITHUB_KC_CLIENT_SECRET" ]; then
          $KCADM update identity-provider/instances/github -r forge \
            -s config.clientId=$GITHUB_KC_CLIENT_ID \
            -s config.clientSecret=$GITHUB_KC_CLIENT_SECRET \
            $SERVER
          echo "✔ GitHub IDP credentials configured"
        else
          echo "⚠ GITHUB_KC_CLIENT_ID/SECRET not set — GitHub social login will not work"
        fi

        # Configure Google identity provider (only if credentials are provided)
        if [ -n "$GOOGLE_CLIENT_ID" ] && [ -n "$GOOGLE_CLIENT_SECRET" ]; then
          $KCADM update identity-provider/instances/google -r forge \
            -s config.clientId=$GOOGLE_CLIENT_ID \
            -s config.clientSecret=$GOOGLE_CLIENT_SECRET \
            $SERVER
          echo "✔ Google IDP credentials configured"
        else
          echo "⚠ GOOGLE_CLIENT_ID/SECRET not set — Google social login will not work"
        fi

        echo "Keycloak setup complete"
    restart: "no"

  # ── Fastify API ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: forge_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://forge:forge@postgres:5432/forge
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      KEYCLOAK_URL: http://keycloak:8081
      KEYCLOAK_REALM: forge
      KEYCLOAK_CLIENT_ID: forge-api
      KEYCLOAK_CLIENT_SECRET: forge-api-secret
      APP_URL: http://localhost
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/apps/api/node_modules
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - forge_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/v1/health > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Next.js web ───────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: forge_web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8081
      NEXT_PUBLIC_KEYCLOAK_REALM: forge
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: forge-web
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/apps/web/.next
      - /app/apps/web/node_modules
      - /app/node_modules
    networks:
      - forge_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── pgAdmin (tools profile only) ──────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: forge_pgadmin
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@forge.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - forge_network
    depends_on:
      - postgres
