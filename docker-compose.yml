version: "3.9"

name: forge

networks:
  forge_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  # ── Docker socket proxy ──────────────────────────────────────────────────
  # Safely exposes only the Docker API endpoints Traefik needs (containers +
  # networks), without giving Traefik direct access to the host socket.
  # The custom HAProxy template strips old /v1.24/ API version prefixes so
  # Docker Desktop (min API v1.44) accepts Traefik's requests.
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: forge_socket_proxy
    restart: unless-stopped
    environment:
      # Allow Traefik to read Docker state (read-only — POST: 0 blocks writes)
      CONTAINERS: 1
      NETWORKS: 1
      EVENTS: 1
      PING: 1
      VERSION: 1
      INFO: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/socket-proxy/haproxy.cfg.template:/usr/local/etc/haproxy/haproxy.cfg.template:ro
    networks:
      - forge_network

  # ── Traefik reverse proxy (file provider + Docker provider for previews) ──
  traefik:
    image: traefik:v3.3
    container_name: forge_traefik
    restart: unless-stopped
    depends_on:
      - socket-proxy
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"   # Traefik dashboard
    volumes:
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/routes.yml:/etc/traefik/routes.yml:ro
    networks:
      - forge_network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: forge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - forge_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: forge_redis
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    networks:
      - forge_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO object storage ──────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: forge_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"    # MinIO Console
    networks:
      - forge_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── MinIO bucket init ─────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: forge_minio_init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infra/minio/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - forge_network
    restart: "no"

  # ── Fastify API ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: forge_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://forge:forge@postgres:5432/forge
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      JWT_SECRET: ${JWT_SECRET:-forge-dev-secret-change-in-production}
      FORGE_ENCRYPTION_KEY: ${FORGE_ENCRYPTION_KEY:-}
      # GitHub OAuth App #1 — code integration (push/pull/import via API)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      # Social login OAuth (separate from code-integration GITHUB_CLIENT_ID in apps/api/.env)
      GITHUB_LOGIN_CLIENT_ID: ${GITHUB_LOGIN_CLIENT_ID:-}
      GITHUB_LOGIN_CLIENT_SECRET: ${GITHUB_LOGIN_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APP_URL: http://localhost
      # ── AWS Bedrock (primary AI provider) ─────────────────────────────────
      # Set these in .env — the container cannot reach the host ~/.aws directory
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_ROLE_ARN: ${AWS_ROLE_ARN:-}
      AWS_PROFILE: ${AWS_PROFILE:-}
      # ── AI Fallback Chain ──────────────────────────────────────────────────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # ── Deployment providers ────────────────────────────────────────────────
      FORGE_VERCEL_API_KEY: ${FORGE_VERCEL_API_KEY:-}
      FORGE_NETLIFY_API_KEY: ${FORGE_NETLIFY_API_KEY:-}
      FORGE_CF_API_TOKEN: ${FORGE_CF_API_TOKEN:-}
      FORGE_CF_ACCOUNT_ID: ${FORGE_CF_ACCOUNT_ID:-}
      # ── Preview containers (Traefik subdomain routing — no host port binding) ──
      TRAEFIK_NETWORK: forge_forge_network
      PREVIEW_DOMAIN: localhost
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/apps/api/node_modules
      - /app/node_modules
      # Mount host AWS credentials so the container can use named profiles / SSO
      - ${HOME}/.aws:/root/.aws:ro
      # Docker socket — required for spinning up per-project preview containers
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - forge_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/v1/health > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Next.js web ───────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: forge_web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost/api
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/apps/web/.next
      - /app/apps/web/node_modules
      - /app/node_modules
    networks:
      - forge_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── pgAdmin (tools profile only) ──────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: forge_pgadmin
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@forge.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - forge_network
    depends_on:
      - postgres
